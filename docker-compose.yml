name: q-goal

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:3000
    init: true
    ports:
      - "3001:80"
    env_file:
      - path: apps/web/.env
        required: false
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    ports:
      - "3000:3000"
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/q-goal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres
    container_name: q-goal-postgres
    environment:
      POSTGRES_DB: q-goal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - q-goal_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  genai:
    build:
      context: .
      dockerfile: genai/Dockerfile
    init: true
    ports:
      - "8002:8002"
    volumes:
      - ./genai/players.db:/app/players.db
      - ./genai/faces:/app/faces:ro
      - ./genai/embeddings.npy:/app/embeddings.npy:ro
      - ./genai/embeddings_clip.npy:/app/embeddings_clip.npy:ro
    env_file:
      - path: genai/.env
        required: false
    environment:
      API_PORT: 8002
    restart: unless-stopped

volumes:
  q-goal_postgres_data:
